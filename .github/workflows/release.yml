name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check if version changed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LATEST_RELEASE=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "")
          RELEASED_VERSION=${LATEST_RELEASE#v}
          echo "current=$CURRENT_VERSION"
          echo "latest_release=$RELEASED_VERSION"
          if [ "$CURRENT_VERSION" != "$RELEASED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build & Release (macOS)
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & make DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: pnpm make:mac

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            release/*.dmg release/*.zip
