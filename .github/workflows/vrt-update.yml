name: VRT Update

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: vrt-update-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  update-snapshots:
    name: Update VRT Snapshots
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/vrt-update')
    runs-on: ubuntu-latest
    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });

            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: '`/vrt-update` はフォーク PR では使用できません。ローカルで `pnpm test:vrt:update` を実行してください。',
              });
              core.setFailed('Cannot update snapshots on fork PRs');
              return;
            }

            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Update snapshots
        run: pnpm test:vrt:update

      - name: Commit and push updated snapshots
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add e2e/

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update VRT baseline snapshots"
            git push origin HEAD
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Post completion comment
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const sha = '${{ steps.commit.outputs.sha }}';
            const prNumber = context.payload.issue.number;

            let body;
            if (changed) {
              body = `VRT スナップショットを更新しました (${sha.substring(0, 7)})。`;
            } else {
              body = 'VRT スナップショットに変更はありませんでした。';
            }

            await Promise.all([
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              }),
              github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
              }),
            ]);

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `VRT スナップショットの更新に失敗しました。[ワークフローログ](${runUrl})を確認してください。`,
            });
